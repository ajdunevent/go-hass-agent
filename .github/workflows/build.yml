name: 🏗️ Build ARM64 DEB Package

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag starting with v (e.g., v1.0.0)
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

permissions:
  contents: write

concurrency:
  group: "build"
  cancel-in-progress: true

jobs:
  build:
    name: Build ARM64 Package
    runs-on: ubuntu-24.04

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-sudo: false
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            go.dev:443
            go.googlesource.com:443
            golang.org:443
            gopkg.in:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            sum.golang.org:443
            uploads.github.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up environment
        run: |
          echo "NFPM_ARCH=arm64" >> $GITHUB_ENV
          echo "APPVERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"

      - name: Build frontend files
        run: |
          npm clean-install
          npm run build:js
          npm run build:css

      - name: Build binary
        run: |
          go build -ldflags="-w -s -X github.com/ajdunevent/go-hass-agent/config.AppVersion=${{ env.APPVERSION }}" -o dist/go-hass-agent
        env:
          CGO_ENABLED: 0
          GOARCH: arm64

      - name: Install upx
        run: sudo apt install -y upx

      - name: Compress binary with upx
        run: upx --best --lzma dist/go-hass-agent

      - name: Create Debian package
        run: |
          go run github.com/goreleaser/nfpm/v2/cmd/nfpm@latest package --packager deb --config .nfpm.yaml --target dist

      - name: Install cosign
        id: cosign_install
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3

      - name: Sign artifacts with cosign
        id: cosign_sign
        shell: bash
        run: |
          shopt -s nullglob
          for artifact in dist/*.deb; do
            echo "Signing ${artifact}"
            cosign --verbose=true sign-blob --yes --key cosign.key --bundle=${artifact}.sig ${artifact}
          done
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - name: Upload release artifacts
        id: upload_release
        run: |
          gh release upload ${{ env.APPVERSION }} dist/*.{deb,sig}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
